<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roundtable v2 — Multi-Agent Games</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
</head>
<body>
  <div id="app">

    <!-- ═══ Discussion Phase (always visible) ═══ -->
    <section id="discussion" class="phase active">
      <div class="discussion-layout game-view">
        <aside id="sidebar">
          <div class="sidebar-header">
            <h2 id="topic-display"></h2>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-label">Progress</div>
            <div id="sidebar-progress"></div>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-label">Panel</div>
            <div id="sidebar-agents"></div>
          </div>

          <div class="sidebar-status" id="status-display">Running</div>
        </aside>

        <div id="game-panel">
          <div id="game-wrapper">
            <div id="game-container"></div>
            <div id="speech-bubble">
              <div class="bubble-text"></div>
              <div class="bubble-tail"></div>
            </div>
          </div>

  <!-- Setup overlay — fixed to window center -->
  <div id="setup-overlay">
    <div class="setup-overlay-inner">
      <div class="logo">🎙️</div>
      <h2>Roundtable <span class="version">v2</span></h2>

      <!-- Mode Selector -->
      <div id="mode-selector" class="mode-selector">
        <div class="mode-card selected" data-mode="discussion">
          <span class="mode-icon">🎙️</span>
          <div class="mode-info">
            <div class="mode-name">Discussion</div>
            <div class="mode-desc">Multi-agent research discussion</div>
          </div>
        </div>
        <div class="mode-card" data-mode="werewolf">
          <span class="mode-icon">🐺</span>
          <div class="mode-info">
            <div class="mode-name">Werewolf</div>
            <div class="mode-desc">AI 狼人杀</div>
          </div>
        </div>
      </div>

      <!-- Dynamic config form (rendered from configSchema) -->
      <div id="config-form" class="setup-form"></div>

      <button id="generate-btn" class="btn primary" style="width:100%;justify-content:center;margin-top:1rem;">
        <span class="btn-text">Generate Plan</span>
        <span class="btn-loading hidden">⏳ Setting up...</span>
      </button>

      <div id="plan-panel" class="hidden">
        <h3 id="plan-panel-title">📐 Sub-topics</h3>
        <div id="plan-subtopics"></div>
        <h3>👥 Panel</h3>
        <div id="agent-cards"></div>
        <div class="panel-actions">
          <button id="regenerate-btn" class="btn secondary">🔄 Regenerate</button>
          <button id="start-btn" class="btn primary">▶ Start</button>
        </div>
      </div>
    </div>
  </div>
          <div id="hud-bar">
            <div id="hud-progress"></div>
            <div id="hud-agents"></div>
          </div>

          <!-- Phase indicator (werewolf) -->
          <div id="phase-indicator" class="hidden"></div>

          <div id="hud-log"></div>
        </div>

        <main id="chat">
          <div id="messages"></div>
          <div id="typing-indicator" class="hidden">
            <div class="typing-dots"><span></span><span></span><span></span></div>
            <span id="typing-name">Agent</span> <span id="typing-label">is thinking…</span>
          </div>
        </main>
      </div>

      <div id="controls">
        <button id="pause-btn" class="btn">⏸ Pause</button>
        <div id="god-view-toggle" class="hidden">
          <label class="toggle-label">
            <input type="checkbox" id="god-view-checkbox" checked />
            <span>👁️ God View</span>
          </label>
        </div>
        <div id="inject-container" class="hidden">
          <input id="inject-input" type="text" placeholder="Add your thoughts…" />
          <button id="inject-btn" class="btn">Send</button>
          <button id="resume-btn" class="btn primary">▶ Resume</button>
        </div>
      </div>
    </section>

    <!-- ═══ Complete Phase ═══ -->
    <section id="complete" class="phase">
      <div class="complete-container">
        <div class="complete-header">
          <div class="logo">✅</div>
          <h1>Complete</h1>
          <p class="subtitle" id="complete-topic"></p>
        </div>
        <div id="summary-content"></div>
        <div id="conflicts-section" class="hidden">
          <h3>⚠️ Identified Conflicts</h3>
          <div id="conflicts-content"></div>
        </div>
        <div class="complete-actions">
          <button id="export-btn" class="btn secondary">📋 Export Markdown</button>
          <button id="new-btn" class="btn primary">🎙️ New Session</button>
        </div>
      </div>
    </section>
  </div>
  <script src="game.js"></script>
  <script src="app.js"></script>
</body>
</html>
